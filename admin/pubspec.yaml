name: cwt_ecommerce_admin_panel
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.5 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  intl: ^0.19.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  clipboard: ^0.1.3
  image_picker: ^1.1.0
  url_launcher: ^6.2.6
  flutter_dropzone: ^3.0.7
  flutter_typeahead: ^5.2.0
  connectivity_plus: ^6.0.3
  multi_select_flutter: ^4.1.3
  cached_network_image: ^3.3.0
  flutter_native_splash: ^2.4.0
  smooth_page_indicator: ^1.1.0
  flex_color_picker: ^3.5.1
  quill_html_editor: ^2.2.8
  image_picker_web: ^4.0.0
  uuid: ^4.4.2
  # firebase_messaging: ^15.0.4
  googleapis_auth: ^1.6.0
  syncfusion_flutter_pdf: ^26.2.12
  flutter_svg: ^2.0.10+1
  
  

  # Web Specific
  web: ^0.5.1
  http: ^1.2.1
  fl_chart: ^0.67.0
  url_strategy: ^0.2.0
  data_table_2: ^2.5.12
  universal_html: ^2.2.4

  # Icons
  # iconsax: ^0.0.8
  iconsax_flutter: ^1.0.0
  cupertino_icons: ^1.0.6

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  firebase_storage: ^11.7.4
  firebase_messaging:
  flutter_local_notifications: ^17.2.2
  

  #--------------- ./ PACKAGES END ------------------#

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true

  #--------------- LOCAL ASSETS ------------------#
  assets:
    - assets/logos/
    - assets/images/content/
    - assets/images/animations/
    - assets/icons/payment_methods/

  #--------------- LOCAL FONTS ------------------#
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/urbanist/Urbanist-Light.ttf
          weight: 300
        - asset: assets/fonts/urbanist/Urbanist-Regular.ttf
          weight: 400
        - asset: assets/fonts/urbanist/Urbanist-Italic.ttf
          style: italic
        - asset: assets/fonts/urbanist/Urbanist-Medium.ttf
          weight: 500
        - asset: assets/fonts/urbanist/Urbanist-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/urbanist/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/urbanist/Urbanist-Bold.ttf
          weight: 800